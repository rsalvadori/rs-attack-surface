<style>
body {
    font-family: Arial;
    background: #0b1220;
    color: white;

}

.container {

}

.header {

}

.grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
}

.card {
    background: #111827;
    border-radius: 14px;
    padding: 20px;
}

.kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    margin-top: 20px;
}

.kpi {
    background: #1f2937;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.kpi h2 {
    margin: 0;
}

.table {
    width: 100%;
}

.table div {
    padding: 10px;
    border-bottom: 1px solid #1f2937;
}

.badge {
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
}

.critical { background:#991b1b; }
.high { background:#dc2626; }
.medium { background:#f59e0b; }
.low { background:#3b82f6; }

</head>

    data: {
        labels: ['Segurança','Privacidade'],
        datasets: [{

});

        </div>
    `;

data.findings
.filter(f => ["high","medium"].includes(f.severity))
.forEach(f => {
    actionDiv.innerHTML += `<div>${f.recommendation}</div>`;
});

    ["lgpd","privacidade","gdpr"].some(k => (f.title||"").toLowerCase().includes(k))
);

    lgpdDiv.innerHTML = "Alto risco regulatório";
} else {
    lgpd.forEach(f=> {
        lgpdDiv.innerHTML += `<div>${f.title}</div>`;
